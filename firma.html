<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Firma digital</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      color: #111;
      margin-bottom: 20px;
      outline: none;
      transition: border 0.15s;
    }
    input[type="text"]:focus { border-color: #111; }

    .canvas-wrapper {
      position: relative;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      background: #fafafa;
      margin-bottom: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 200px;
      touch-action: none;
      cursor: crosshair;
    }

    .canvas-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #bbb;
      font-size: 13px;
      pointer-events: none;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn-secondary {
      flex: 1;
      padding: 11px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      background: white;
      color: #555;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #f5f5f5; }

    .btn-primary {
      flex: 2;
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary:hover { background: #333; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

    .error-msg {
      font-size: 13px;
      color: #c0392b;
      margin-bottom: 12px;
      display: none;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin-bottom: 16px;
    }

    .legal {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      line-height: 1.5;
    }

    .success {
      display: none;
      text-align: center;
      padding: 12px 0;
    }
    .success-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #e8f5e9;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .success h2 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }
    .success p {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
    }
    .btn-restart {
      width: 100%;
      padding: 11px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      background: white;
      color: #555;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-restart:hover { background: #f5f5f5; }

    .loading {
      display: none;
      text-align: center;
      padding: 8px 0 16px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

<div class="card">

  <div id="formView">
    <h1>Firma digital</h1>
    <p class="subtitle">Rellena tu nombre y firma con el dedo</p>

    <label for="nombreInput">Nombre completo</label>
    <input type="text" id="nombreInput" placeholder="Ej: Ana García López" />

    <label>Firma</label>
    <div class="canvas-wrapper">
      <canvas id="signCanvas"></canvas>
      <div class="canvas-hint" id="hint">✍️ Firma aquí</div>
    </div>

    <p class="error-msg" id="errorMsg">Por favor, escribe tu nombre y añade tu firma.</p>

    <div class="actions">
      <button class="btn-secondary" id="clearBtn">Borrar</button>
      <button class="btn-primary" id="saveBtn">Guardar firma</button>
    </div>

    <p class="loading" id="loading">Guardando... espera un momento ⏳</p>

    <hr class="divider" />
    <p class="legal">Al guardar tu firma confirmas que es tu rúbrica personal.</p>
  </div>

  <div class="success" id="successView">
    <div class="success-icon">
      <svg width="28" height="28" fill="none" stroke="#2e7d32" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h2>¡Firma guardada!</h2>
    <p id="successName"></p>
    <button class="btn-restart" id="restartBtn">Firmar de nuevo</button>
  </div>

</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9er9iDf0hZHiE7dye84ZOg06AC592EmhuJlHpNtPvFbF3zpgw44LJ2K-bNQ8PHeBtQA/exec';

  const canvas = document.getElementById('signCanvas');
  const ctx = canvas.getContext('2d');
  const hint = document.getElementById('hint');
  const clearBtn = document.getElementById('clearBtn');
  const saveBtn = document.getElementById('saveBtn');
  const restartBtn = document.getElementById('restartBtn');
  const formView = document.getElementById('formView');
  const successView = document.getElementById('successView');
  const errorMsg = document.getElementById('errorMsg');
  const loading = document.getElementById('loading');
  const nombreInput = document.getElementById('nombreInput');

  let drawing = false;
  let hasSig = false;

  function resize() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
  resize();

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  function start(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    hint.style.display = 'none';
  }

  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    hasSig = true;
  }

  function end(e) {
    if (!drawing) return;
    e.preventDefault();
    drawing = false;
    ctx.beginPath();
  }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', end, { passive: false });

  clearBtn.addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasSig = false;
    hint.style.display = '';
    errorMsg.style.display = 'none';
  });

  saveBtn.addEventListener('click', async () => {
    const nombre = nombreInput.value.trim();
    if (!nombre || !hasSig) {
      errorMsg.style.display = 'block';
      return;
    }
    errorMsg.style.display = 'none';
    saveBtn.disabled = true;
    loading.style.display = 'block';

    const firma = canvas.toDataURL('image/png');

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, firma })
      });
    } catch (err) {
      console.error(err);
    }

    loading.style.display = 'none';
    document.getElementById('successName').textContent = 'Gracias, ' + nombre + '. Tu firma ha sido registrada correctamente.';
    formView.style.display = 'none';
    successView.style.display = 'block';
  });

  restartBtn.addEventListener('click', () => {
    formView.style.display = 'block';
    successView.style.display = 'none';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasSig = false;
    hint.style.display = '';
    saveBtn.disabled = false;
    nombreInput.value = '';
    errorMsg.style.display = 'none';
  });
</script>

</body>
</html>
