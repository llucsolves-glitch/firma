<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Firma digital</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
    }

    .canvas-wrapper {
      position: relative;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      background: #fafafa;
      margin-bottom: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 200px;
      touch-action: none;
      cursor: crosshair;
    }

    .canvas-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #bbb;
      font-size: 13px;
      pointer-events: none;
      line-height: 1.6;
    }

    .canvas-hint svg {
      display: block;
      margin: 0 auto 6px;
      opacity: 0.5;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn-secondary {
      flex: 1;
      padding: 11px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      background: white;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #f5f5f5; }

    .btn-primary {
      flex: 2;
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #333; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin-bottom: 16px;
    }

    .legal {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      line-height: 1.5;
    }

    /* Pantalla de éxito */
    .success {
      display: none;
      text-align: center;
      padding: 12px 0;
    }
    .success-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #e8f5e9;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .success h2 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }
    .success p {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
    }
    .preview-img {
      border: 1px solid #eee;
      border-radius: 8px;
      max-width: 100%;
      margin-bottom: 16px;
    }
    .btn-restart {
      width: 100%;
      padding: 11px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      background: white;
      color: #555;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-restart:hover { background: #f5f5f5; }
  </style>
</head>
<body>

<div class="card">

  <!-- Formulario de firma -->
  <div id="formView">
    <h1>Firma digital</h1>
    <p class="subtitle">Dibuja tu firma con el dedo en el recuadro</p>

    <div class="canvas-wrapper">
      <canvas id="signCanvas"></canvas>
      <div class="canvas-hint" id="hint">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M15.232 5.232l3.536 3.536M9 11l6.536-6.536a2 2 0 012.828 2.828L11.828 13.828a4 4 0 01-1.414.94l-3.414 1.138 1.138-3.414A4 4 0 019 11z"/>
        </svg>
        Firma aquí
      </div>
    </div>

    <div class="actions">
      <button class="btn-secondary" id="clearBtn">Borrar</button>
      <button class="btn-primary" id="saveBtn" disabled>Guardar firma</button>
    </div>

    <hr class="divider" />
    <p class="legal">Al guardar tu firma confirmas que es tu rúbrica personal y aceptas que tiene validez en el contexto de este formulario.</p>
  </div>

  <!-- Pantalla de éxito -->
  <div class="success" id="successView">
    <div class="success-icon">
      <svg width="28" height="28" fill="none" stroke="#2e7d32" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h2>Firma guardada</h2>
    <p>Tu firma ha sido registrada correctamente. Puedes cerrar esta ventana.</p>
    <img id="previewImg" class="preview-img" alt="Tu firma" />
    <button class="btn-restart" id="restartBtn">Firmar de nuevo</button>
  </div>

</div>

<script>
  const canvas = document.getElementById('signCanvas');
  const ctx = canvas.getContext('2d');
  const hint = document.getElementById('hint');
  const clearBtn = document.getElementById('clearBtn');
  const saveBtn = document.getElementById('saveBtn');
  const restartBtn = document.getElementById('restartBtn');
  const formView = document.getElementById('formView');
  const successView = document.getElementById('successView');
  const previewImg = document.getElementById('previewImg');

  let drawing = false;
  let hasSig = false;

  function resize() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }

  window.addEventListener('resize', () => { if (!hasSig) resize(); });
  resize();

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  function start(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    hint.style.display = 'none';
  }

  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    if (!hasSig) {
      hasSig = true;
      saveBtn.disabled = false;
    }
  }

  function end(e) {
    if (!drawing) return;
    e.preventDefault();
    drawing = false;
    ctx.beginPath();
  }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', end, { passive: false });

  clearBtn.addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasSig = false;
    saveBtn.disabled = true;
    hint.style.display = '';
  });

  saveBtn.addEventListener('click', () => {
    if (!hasSig) return;
    const dataURL = canvas.toDataURL('image/png');
    previewImg.src = dataURL;
    formView.style.display = 'none';
    successView.style.display = 'block';
    // Aquí puedes añadir el envío de la firma a tu servidor si lo necesitas
    // fetch('TU_URL', { method: 'POST', body: JSON.stringify({ firma: dataURL }) });
  });

  restartBtn.addEventListener('click', () => {
    formView.style.display = 'block';
    successView.style.display = 'none';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasSig = false;
    saveBtn.disabled = true;
    hint.style.display = '';
  });
</script>

</body>
</html>
